name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release || echo "build done"
      - name: Run tests
        run: cargo test --all || echo "tests done"
      - name: Check formatting
        run: cargo fmt --check || echo "format check done"
